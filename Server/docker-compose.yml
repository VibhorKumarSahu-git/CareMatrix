version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: carematrix-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: carematrix
      MYSQL_USER: carematrix
      MYSQL_PASSWORD: carematrix123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database_schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    networks:
      - carematrix-network

  # FastAPI Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: carematrix-api
    environment:
      DATABASE_URL: mysql+mysqlconnector://carematrix:carematrix123@mysql:3306/carematrix
      HOST: 0.0.0.0
      PORT: 8000
      DEBUG: "False"
      ALLOWED_ORIGINS: '["http://localhost:3000", "http://localhost:5173"]'
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - .:/app
    networks:
      - carematrix-network
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  mysql_data:

networks:
  carematrix-network:
    driver: bridge
